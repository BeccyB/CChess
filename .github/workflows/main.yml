name: Chess CI

on:
  push:
    branches:
      - main
      - release/*
      - 14-setup-ci
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_linux:
    name: build_linux
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 

      - name: Install dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: |
            sudo apt-get update -qq
            sudo apt-get install -y ccache lcov gcovr cmake cmake-data 
            echo "/usr/lib/ccache" >> $GITHUB_PATH

      - name: configure cmake
        run: |
          mkdir ${{ github.workspace}}/build
          cmake -B ${{ github.workspace}}/build -S ${{ github.workspace}} -DCMAKE_BUILD_TYPE=Debug -DCHESS_ENABLE_COVERAGE=ON

      - name: build
        run: cmake --build ${{ github.workspace}}/build

      - name: create build dir archive
        shell: bash
        run: |
          tar -czf build.tar.gz build

      - name: Upload build directory
        uses: actions/upload-artifact@v4
        with:
          name: build-linux-artifact
          path: build.tar.gz
          retention-days: 1

  test_linux:
    needs: build_linux
    name: test_linux
    runs-on: ubuntu-22.04

    steps:
      #- uses: actions/checkout@v4
      # 1. get the pre-built artifacts
      - name: Download build directory
        uses: actions/download-artifact@v4
        with:
          name: build-linux-artifact
      # 2. extract
      - name: extract build archive
        shell: bash
        run: |
          tar -xzf build.tar.gz 
      # 3. show directory
      # - name: Show directory 
      #   run: |
      #     ls -al
      # 4. test
      # - name: Show directory tree
      #   run: |
      #     tree
      - name: tests
        run: |
          cd build/tests 
          ./all_tests

